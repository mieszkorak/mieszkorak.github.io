<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizytówka | Mieszko Rak - Księgowy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Główny kolor nawiązujący do zaufania i finansów (ciemny turkus/granat) */
            --primary-color: #0f766e; 
            --text-color: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Tło z darmowej bazy zdjęć Unsplash - motyw: kalkulator, dokumenty, finanse */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)),
                url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            /* Efekt oszronionego szkła (Glassmorphism) */
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #047857);
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: #111827;
        }

        .tagline {
            color: var(--primary-color);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0.5rem 0 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            text-decoration: none;
            background: #ffffff;
            color: var(--text-color);
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
        }

        .link-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .icon {
            font-size: 1.3rem;
        }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">
            MR
        </div>

        <h1>Mieszko Rak</h1>
        <p class="tagline">Księgowy</p>

        <p class="bio">
            Student Uniwersytetu Kardynała Stefana Wyszyńskiego (UKSW).<br>Oferuję profesjonalne usługi księgowe i wsparcie finansowe.
        </p>

        <div class="links">
            <!-- Przycisk E-mail -->
            <a href="mailto:mieszko.rak@gmail.com" class="link-btn">
                <span class="icon">✉️</span> mieszko.rak@gmail.com
            </a>
            
            <!-- Przycisk Telefon -->
            <a href="tel:+48535535133" class="link-btn">
                <span class="icon">📞</span> 535 535 133
            </a>
        </div>
    </div>

</body>
</html>
