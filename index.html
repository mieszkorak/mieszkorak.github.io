<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizytówka | Mieszko Rak - Księgowy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f766e; 
            --text-color: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)),
                url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #047857);
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; color: #111827; }
        .tagline { color: var(--primary-color); font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 1.5rem; text-transform: uppercase; }
        
        .bio { font-size: 1rem; line-height: 1.5; color: #4b5563; margin-bottom: 2rem; }

        .links { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2.5rem; }

        .link-btn {
            text-decoration: none;
            background: #ffffff;
            color: var(--text-color);
            padding: 0.8rem;
            border-radius: 0.75rem;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        /* Styl formularza */
        .contact-form {
            text-align: left;
            border-top: 1px solid #e5e7eb;
            padding-top: 2rem;
        }

        .contact-form h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #111827;
            text-align: center;
        }

        .form-group { margin-bottom: 1rem; }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #374151; }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            font-family: inherit;
            box-sizing: border-box;
            background: white;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover { background: #0d665e; }

        @media (max-width: 480px) { .card { padding: 2rem 1.5rem; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">MR</div>

        <h1>Mieszko Rak</h1>
        <p class="tagline">Księgowy</p>

        <p class="bio">
            Student UKSW.<br>Profesjonalne usługi księgowe.
        </p>

        <div class="links">
            <a href="mailto:mieszko.rak@gmail.com" class="link-btn">✉️ E-mail</a>
            <a href="tel:+48535535133" class="link-btn">📞 535 535 133</a>
        </div>

        <!-- Formularz kontaktowy -->
        <div class="contact-form">
            <h3>Napisz do mnie</h3>
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <div class="form-group">
                    <label>Twój E-mail:</label>
                    <input type="email" name="email" required placeholder="email@przyklad.pl">
                </div>
                <div class="form-group">
                    <label>Wiadomość:</label>
                    <textarea name="message" rows="4" required placeholder="W czym mogę pomóc?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Wyślij wiadomość</button>
            </form>
        </div>
    </div>

</body>
</html>
